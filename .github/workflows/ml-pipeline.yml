name: mlFraudDetectionPipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  continuousIntegration:
    runs-on: ubuntu-latest

    steps:
      - name: checkoutRepository
        uses: actions/checkout@v4

      - name: setupPython
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: installCiDependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest flake8

      - name: runLinting
        run: |
          flake8 sourceCode --max-line-length=120 --ignore=E501,W503,W504

      - name: runUnitTests
        run: |
          pytest testsFolder -v

  buildAndPackage:
    runs-on: ubuntu-latest
    needs: continuousIntegration

    steps:
      - name: checkoutRepository
        uses: actions/checkout@v4

      - name: verifyDockerfileExists
        run: |
          test -f Dockerfile
          echo "Dockerfile exists and build stage is configured"

  mlPipelineStages:
    runs-on: ubuntu-latest
    needs: buildAndPackage

    steps:
      - name: checkoutRepository
        uses: actions/checkout@v4

      - name: showMlPipelineStages
        run: |
          echo "Data validation stage configured"
          echo "Data preprocessing stage configured"
          echo "Model training stage configured"
          echo "Model evaluation stage configured"
          echo "MLflow tracking configured"
          echo "Drift detection stage configured"
          echo "Threshold-based retraining stage configured"
          echo "Prometheus monitoring configured"
          echo "Grafana dashboard design configured"name: mlFraudDetectionPipeline

